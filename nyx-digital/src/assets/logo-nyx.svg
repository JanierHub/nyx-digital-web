<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo Nyx Digital - Diseño amigable y profesional -->
  
  <!-- Fondo con gradiente suave -->
  <rect width="200" height="50" rx="8" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Icono de Nyx - Estrella/Nube estilizada -->
  <g transform="translate(10, 10)">
    <!-- Círculo de fondo -->
    <circle cx="15" cy="15" r="12" fill="url(#iconGradient)" opacity="0.2"/>
    
    <!-- Símbolo Nyx - N estilizado con elementos -->
    <g transform="translate(8, 5)">
      <!-- Línea principal de la N -->
      <path d="M 0 0 L 0 20 L 2 20 L 2 8 L 10 18 L 10 0 L 12 0 L 12 20 L 10 20" 
            stroke="url(#iconGradient)" stroke-width="2" fill="none" stroke-linecap="round"/>
      
      <!-- Puntos decorativos - estrellas pequeñas -->
      <circle cx="14" cy="4" r="1" fill="#64FFDA" opacity="0.8"/>
      <circle cx="16" cy="7" r="0.8" fill="#00E5FF" opacity="0.6"/>
      <circle cx="13" cy="9" r="0.6" fill="#64FFDA" opacity="0.4"/>
    </g>
  </g>
  
  <!-- Texto "Nyx Digital" -->
  <g transform="translate(40, 25)">
    <!-- Nyx -->
    <text x="0" y="0" font-family="'Segoe UI', 'Arial', sans-serif" font-size="18" font-weight="600" fill="url(#textGradient)">
      Nyx
    </text>
    
    <!-- Digital -->
    <text x="35" y="0" font-family="'Segoe UI', 'Arial', sans-serif" font-size="18" font-weight="400" fill="#8892B0">
      Digital
    </text>
  </g>
  
  <!-- Línea decorativa -->
  <line x1="40" y1="38" x2="120" y2="38" stroke="url(#textGradient)" stroke-width="1" opacity="0.3"/>
  
  <!-- Definiciones de gradientes -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64FFDA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0.1" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64FFDA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64FFDA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
