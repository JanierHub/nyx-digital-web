<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <title>Nyx Digital</title>
  <defs>
    <radialGradient id="eclipse" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2d3748"/>
      <stop offset="50%" stop-color="#1a202c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="70%" stop-color="#64FFDA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Halo del eclipse -->
  <circle cx="24" cy="24" r="22" fill="url(#halo)"/>
  
  <!-- Círculo exterior del eclipse -->
  <circle cx="24" cy="24" r="20" stroke="#64FFDA" stroke-width="1.5" fill="none" opacity="0.8"/>
  
  <!-- Luna oscura (eclipse) -->
  <circle cx="24" cy="24" r="18" fill="url(#eclipse)"/>
  
  <!-- Brillo del eclipse -->
  <ellipse cx="28" cy="20" rx="10" ry="12" fill="#1a202c" opacity="0.6"/>
  
  <!-- Estrella brillante -->
  <circle cx="32" cy="16" r="2" fill="#64FFDA" filter="url(#glow)"/>
  
  <!-- Rayos de la estrella -->
  <line x1="32" y1="13" x2="32" y2="11" stroke="#64FFDA" stroke-width="0.5" opacity="0.6"/>
  <line x1="32" y1="19" x2="32" y2="21" stroke="#64FFDA" stroke-width="0.5" opacity="0.6"/>
  <line x1="29" y1="16" x2="27" y2="16" stroke="#64FFDA" stroke-width="0.5" opacity="0.6"/>
  <line x1="35" y1="16" x2="37" y2="16" stroke="#64FFDA" stroke-width="0.5" opacity="0.6"/>
</svg>
